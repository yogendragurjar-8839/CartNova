<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
        }
        .container {
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background: purple;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Register</h2>

    <form th:action="@{/public/register}" method="post" th:object="${user}">

        <input type="text" th:field="*{username}" placeholder="Enter Name" required />

        <input type="text" th:field="*{email}" placeholder="Enter Email" required />

        <input type="password" th:field="*{password}" placeholder="Enter Password" required />

        <select th:field="*{role}">
            <option value="USER">USER</option>
            <option value="ADMIN">ADMIN</option>
        </select>

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
